<h2 mat-dialog-title>Sample #{{ sample.id }}</h2>
<mat-dialog-content class="detail">
  <div class="image-wrap">
    <img [src]="imageUrl()" [alt]="'sample ' + sample.id" />
    <button mat-mini-fab class="zoom-btn" aria-label="Maximize image" (click)="openZoom()">
      <mat-icon>zoom_in</mat-icon>
    </button>
  </div>

  <dl class="fields">
    <dt>Model guess</dt>
    <dd>{{ sample.engine_guess || '—' }}</dd>
    <dt>Label</dt>
    <dd>{{ sample.text }}</dd>
    <dt>Rating</dt>
    <dd>
      <span class="rating-badge" [class]="'r-' + sample.rating">{{ sample.rating }}</span>
    </dd>
    <dt>Confidence</dt>
    <dd [class.low-conf]="sample.confidence != null && sample.confidence < 0.5">
      {{ confidenceText() }}
    </dd>
    <dt>Language</dt>
    <dd>{{ sample.language }}</dd>
  </dl>

  <p class="hint">Read-only. Edit labels from the Labeling or Review pages.</p>
</mat-dialog-content>
<mat-dialog-actions align="end">
  <button mat-stroked-button color="warn" (click)="remove()">Delete</button>
  <button mat-flat-button (click)="close()">Close</button>
</mat-dialog-actions>
