<div class="data">
  <div class="head">
    <h2>Labeled data</h2>
    <span class="spacer"></span>
    <button mat-stroked-button (click)="reload()" [disabled]="loading()">Refresh</button>
    <button mat-stroked-button (click)="exportLabels()">Export</button>
    <button mat-stroked-button (click)="fileInput.click()" [disabled]="importing()">Import</button>
    <input #fileInput type="file" accept=".zip" hidden (change)="onImport($event)" />
    @if (loading() || importing()) {
      <mat-progress-spinner diameter="20" mode="indeterminate" />
    }
  </div>

  <div class="filters">
    <mat-button-toggle-group [value]="filter()" (change)="setFilter($event.value)" hideSingleSelectionIndicator>
      <mat-button-toggle value="all">All</mat-button-toggle>
      <mat-button-toggle value="correct">Correct</mat-button-toggle>
      <mat-button-toggle value="incorrect">Incorrect</mat-button-toggle>
    </mat-button-toggle-group>

    <mat-form-field appearance="outline" class="search" subscriptSizing="dynamic">
      <mat-label>Search text</mat-label>
      <input matInput [value]="query()" (input)="query.set($any($event.target).value)" />
    </mat-form-field>

    <span class="count">{{ filtered().length }} shown</span>
  </div>

  @if (!loading() && filtered().length === 0) {
    <p class="muted">No matching samples.</p>
  } @else {
    <cdk-virtual-scroll-viewport itemSize="60" class="viewport">
      <button *cdkVirtualFor="let s of filtered()" type="button" class="row"
        [class.incorrect]="s.rating === 'incorrect'" (click)="openDetail(s)">
        <img [src]="imageUrl(s.id)" loading="lazy" alt="" />
        <span class="txt">{{ s.text }}</span>
        <span class="rating">{{ s.rating }}</span>
      </button>
    </cdk-virtual-scroll-viewport>
  }
</div>
