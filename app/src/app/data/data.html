<div class="data">
  <div class="head">
    <h2>Labeled data</h2>
    <button mat-stroked-button (click)="reload()" [disabled]="loading()">Refresh</button>
    @if (loading()) {
      <mat-progress-spinner diameter="20" mode="indeterminate" />
    }
  </div>

  @if (!loading() && samples().length === 0) {
    <p class="muted">No labeled samples yet. Draw and save some on the Labeling tab.</p>
  }

  <div class="grid">
    @for (s of samples(); track s.id) {
      <mat-card class="card" appearance="outlined">
        <div class="card-top">
          <span class="lang">{{ s.language }}</span>
          @if (isSaving(s.id)) {
            <mat-progress-spinner class="saving" diameter="18" mode="indeterminate" />
          }
        </div>
        <img [src]="imageUrl(s.id)" [alt]="'sample ' + s.id" />
        <mat-form-field appearance="outline" class="text">
          <mat-label>Text</mat-label>
          <input matInput [value]="s.text" (input)="setText(s, $any($event.target).value)" />
        </mat-form-field>
        <mat-button-toggle-group [value]="s.rating" (change)="setRating(s, $event.value)" hideSingleSelectionIndicator>
          <mat-button-toggle value="correct">Correct</mat-button-toggle>
          <mat-button-toggle value="incorrect">Incorrect</mat-button-toggle>
        </mat-button-toggle-group>
        <button mat-stroked-button color="warn" class="delete" (click)="remove(s)">Delete</button>
      </mat-card>
    }
  </div>
</div>
