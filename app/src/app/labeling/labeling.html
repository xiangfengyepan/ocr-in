<mat-card class="labeling">
  <mat-card-header>
    <mat-card-title>Label a word</mat-card-title>
    <mat-card-subtitle>Draw a single word, get a guess, and rate it.</mat-card-subtitle>
  </mat-card-header>

  <mat-card-content>
    <div class="controls">
      <mat-form-field appearance="outline" class="lang">
        <mat-label>Language</mat-label>
        <mat-select [value]="language()" (selectionChange)="language.set($event.value)">
          @for (l of languages; track l) {
            <mat-option [value]="l">{{ l }}</mat-option>
          }
        </mat-select>
      </mat-form-field>
      <span class="count">Saved: {{ total() }}</span>
    </div>

    <canvas #canvas width="800" height="200"
      (pointerdown)="onPointerDown($event)"
      (pointermove)="onPointerMove($event)"
      (pointerup)="onPointerUp()"
      (pointerleave)="onPointerUp()"></canvas>

    <div class="actions">
      <button mat-stroked-button (click)="clear()">Clear</button>
      <button mat-flat-button color="primary" (click)="doGuess()" [disabled]="guessing()">
        @if (guessing()) {
          <mat-progress-spinner diameter="18" mode="indeterminate" />
        } @else {
          Guess
        }
      </button>
    </div>

    @if (guess() !== null) {
      <div class="result">
        <p>Guess: <strong>{{ guess() }}</strong> <em>({{ confidence() | number: '1.2-2' }})</em></p>
        <mat-button-toggle-group [value]="rating()" (change)="rate($event.value)" hideSingleSelectionIndicator>
          <mat-button-toggle value="correct">Correct</mat-button-toggle>
          <mat-button-toggle value="incorrect">Incorrect</mat-button-toggle>
        </mat-button-toggle-group>

        @if (rating() === 'incorrect') {
          <mat-form-field appearance="outline" class="correction">
            <mat-label>Correct text</mat-label>
            <input matInput [value]="text()" (input)="text.set($any($event.target).value)" />
          </mat-form-field>
        }

        <button mat-flat-button color="primary" class="save"
          [disabled]="!rating() || saving()" (click)="save()">
          @if (saving()) {
            <mat-progress-spinner diameter="18" mode="indeterminate" />
          } @else {
            Save
          }
        </button>
      </div>
    }
  </mat-card-content>
</mat-card>
