@if (!isReview()) {
  <mat-toolbar class="topbar">
    <span class="title">Handwriting OCR</span>
    <nav class="tabs">
      <a mat-button routerLink="/labeling" routerLinkActive="active">Labeling</a>
      <a mat-button routerLink="/data" routerLinkActive="active">Data</a>
      <a mat-button routerLink="/models" routerLinkActive="active">Models</a>
      <a mat-button routerLink="/training" routerLinkActive="active">Training</a>
      <a mat-button routerLink="/ocr" routerLinkActive="active">OCR</a>
      <a mat-button routerLink="/review" routerLinkActive="active">Review</a>
    </nav>
    <span class="spacer"></span>
    <button mat-icon-button class="config-btn" aria-label="Configuration" (click)="openConfig()">
      <mat-icon>settings</mat-icon>
    </button>
  </mat-toolbar>
}
<main class="page">
  <router-outlet />
</main>
